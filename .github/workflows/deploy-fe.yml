name: Deploy Frontend

on:
  push:
    branches:
      - main

jobs:
  deploy:
    name: Build and Deploy to S3/CloudFront
    runs-on: ubuntu-latest
    env:
      NODE_VERSION: '20'
      AWS_REGION: ${{ vars.AWS_REGION }}
      S3_BUCKET: ${{ vars.AWS_S3_BUCKET }}
      CLOUDFRONT_DISTRIBUTION_ID: ${{ vars.CF_DISTRIBUTION_ID }}
      VITE_REDUX_SECRET: ${{ secrets.VITE_REDUX_SECRET }}
      VITE_URL_ENCRYPTION_KEY: ${{ secrets.VITE_URL_ENCRYPTION_KEY }}
      VITE_RESEND_OTP_TIMER: ${{ vars.VITE_RESEND_OTP_TIMER }}
      VITE_SHOW_DEV_ROUTES: ${{ vars.VITE_SHOW_DEV_ROUTES }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          aws-access-key-id: ${{ vars.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Deploy static assets to S3
        run: |
          aws s3 sync dist s3://${S3_BUCKET}/health-telematix/mobile/ --delete --exclude "index.html"

      - name: Copy index.html with no-cache headers
        run: |
          aws s3 cp dist/index.html s3://${S3_BUCKET}/health-telematix/mobile/index.html \
            --cache-control "no-cache, no-store, must-revalidate" \
            --content-type "text/html"

      - name: Invalidate CloudFront cache
        run: |
          aws cloudfront create-invalidation \
            --distribution-id "${CLOUDFRONT_DISTRIBUTION_ID}" \
            --paths "/*"
